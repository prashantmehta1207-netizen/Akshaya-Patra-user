<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshaya Patra - Complaint Portal</title>
    <!-- Tailwind CSS for modern, clean UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Akshaya Patra orange/blue branding colors */
        .brand-orange { color: #f26f21; }
        .bg-brand-orange { background-color: #f26f21; }
        .bg-brand-orange:hover { background-color: #d95e18; }
        .border-brand-orange { border-color: #f26f21; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Container Card -->
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <!-- Header -->
        <div class="bg-brand-orange text-white p-6 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">Akshaya Patra</h1>
                <p class="text-sm opacity-90">Complaint Management Portal</p>
            </div>
            <i data-lucide="shield-alert" class="w-10 h-10"></i>
        </div>

        <!-- Complaint Form -->
        <form id="complaintForm" class="p-6 space-y-6">
            
            <!-- User Info Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="YourName">Your Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="YourName" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="Enter your full name">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="email" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="name@example.com">
                    </div>
                </div>
            </div>

            <!-- Phone and Category -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="phone">Phone Number</label>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="tel" id="phone" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="Enter mobile number">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="category">Category</label>
                    <div class="relative">
                        <i data-lucide="tag" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <select id="category" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none bg-white">
                            <option value="" disabled selected>Select complaint category</option>
                            <option value="Hardware">Hardware / IT Equipment</option>
                            <option value="Software">Software / Network</option>
                            <option value="Kitchen-Equipment">Kitchen Equipment</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr class="border-gray-200">

            <!-- Complaint Title & Description -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="title">Complaint Title</label>
                <div class="relative">
                    <i data-lucide="alert-circle" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="title" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="Short summary of the issue">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1" for="description">Detailed Description</label>
                <textarea id="description" required rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="Please explain the problem in detail..."></textarea>
            </div>

            <!-- Priority Selection -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Priority Level</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="priority" value="Low" checked class="text-orange-500 focus:ring-orange-500">
                        <span class="text-gray-700">Low</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="priority" value="Medium" class="text-orange-500 focus:ring-orange-500">
                        <span class="text-gray-700">Medium</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="priority" value="High" class="text-orange-500 focus:ring-orange-500">
                        <span class="text-gray-700 text-red-600 font-medium">High</span>
                    </label>
                </div>
            </div>

            <!-- Image Upload & Preview Section -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Attach Photo (Optional)</label>
                <div class="flex items-center gap-4">
                    <label for="photo" class="flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <i data-lucide="camera" class="w-5 h-5 text-gray-500"></i>
                        <span class="text-sm font-medium text-gray-600">Choose Image</span>
                        <input type="file" id="photo" accept="image/*" class="hidden">
                    </label>
                    
                    <!-- Live Preview Box -->
                    <div class="w-24 h-24 border border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center overflow-hidden bg-gray-50 relative">
                        <i id="emptyIcon" data-lucide="image" class="w-8 h-8 text-gray-300"></i>
                        <span id="previewText" class="text-[10px] text-gray-400 mt-1">No Preview</span>
                        <img id="photoPreview" src="" alt="Preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-brand-orange text-white py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-opacity-90 transition duration-150 ease-in-out shadow-md">
                <i data-lucide="send"></i>
                Submit Complaint
            </button>

        </form>
    </div>

    <!-- Frontend logic with dynamic API Routing -->
    <script type="module">
        lucide.createIcons();

        const form = document.getElementById("complaintForm");
        const submitBtn = document.getElementById("submitBtn");
        const photoInput = document.getElementById("photo");
        const photoPreview = document.getElementById("photoPreview");
        const previewText = document.getElementById("previewText");
        const emptyIcon = document.getElementById("emptyIcon");

        const urlParams = new URLSearchParams(window.location.search);
        const assetTag = urlParams.get("id");

        let globalAssetData = null;

        // Dynamically configure base URL so both localhost and mobile/hotspot work instantly
        const backendHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'localhost'
            : window.location.hostname;
        
        const backendBaseUrl = `http://${backendHost}:3000`;

        // 1. Fetch Snipe-IT details if asset tag ID exists in the URL parameters
        window.addEventListener('DOMContentLoaded', async () => {
            if (assetTag) {
                console.log("Fetching Snipe-IT info via backend for tag:", assetTag);
                try {
                    const response = await fetch(`${backendBaseUrl}/api/snipe/asset/${assetTag}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.success) {
                            globalAssetData = data;
                            console.log("Snipe-IT Asset loaded successfully:", globalAssetData);
                        }
                    }
                } catch (err) {
                    console.error("Failed to preload asset details from server:", err);
                }
            }
        });

        // 2. Photo Live Preview
        photoInput.addEventListener("change", function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    photoPreview.src = event.target.result;
                    photoPreview.classList.remove("hidden");
                    previewText.style.display = "none";
                    emptyIcon.style.display = "none";
                };
                reader.readAsDataURL(file);
            } else {
                photoPreview.src = "";
                photoPreview.classList.add("hidden");
                previewText.style.display = "block";
                emptyIcon.style.display = "block";
            }
        });

        // 3. Form Submission Handler
        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting Complaint...";

            try {
                const userEmail = document.getElementById("email").value;
                const userName = document.getElementById("YourName").value;
                const selectedCategory = document.getElementById("category").value;
                const complaintTitle = document.getElementById("title").value;

                const formData = new FormData();

                // If Snipe-IT details were preloaded, append them
                if (globalAssetData) {
                    formData.append("assetId", globalAssetData.assetId || "");
                    formData.append("assetTag", globalAssetData.assetTag || "");
                    formData.append("assetModel", globalAssetData.assetModel || "");
                    formData.append("assetManufacturer", globalAssetData.assetManufacturer || "");
                    formData.append("assetLocation", globalAssetData.assetLocation || "");
                    formData.append("assetStatus", globalAssetData.assetStatus || "");
                } else {
                    formData.append("assetTag", assetTag || "");
                }

                formData.append("userName", userName);
                formData.append("phone", document.getElementById("phone").value);
                formData.append("category", selectedCategory);
                formData.append("email", userEmail);
                formData.append("title", complaintTitle);
                formData.append("description", document.getElementById("description").value);
                formData.append("priority", document.querySelector('input[name="priority"]:checked')?.value || "Low");

                if (photoInput.files[0]) {
                    formData.append("complaintImage", photoInput.files[0]);
                }

                console.log(`Sending complaint to backend: ${backendBaseUrl}/api/complaints`);
                const backendResponse = await fetch(`${backendBaseUrl}/api/complaints`, {
                    method: "POST",
                    body: formData
                });

                if (!backendResponse.ok) {
                    throw new Error("Server returned an error. Make sure server.js is running.");
                }

                const result = await backendResponse.json();
                localStorage.setItem("myComplaintID", result.complaintId);
                console.log("Saved successfully! ID:", result.complaintId);

                // Redirect to success screen
                window.location.href = "success.html";

            } catch (error) {
                console.error("Submission Error:", error);
                alert(`Submission failed: Make sure your server.js is running at: ${backendBaseUrl}`);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i data-lucide="send"></i> Submit Complaint';
                lucide.createIcons(); // Re-render icon on error reset
            }
        });
    </script>
</body>
</html>
